<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
<title>Lumen</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">L</div>
      <div>
        <div class="brand-name">Lumen</div>
        <div class="brand-sub">Repository insight</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button id="btn-open" class="btn btn-primary">Open Repository…</button>
      <button id="btn-export" class="btn" disabled>Export HTML</button>
    </div>
  </header>

  <main id="main">
    <section id="empty" class="empty">
      <div class="empty-card">
        <div class="empty-icon">📂</div>
        <h2>No repository selected</h2>
        <p>Pick a folder to scan. Lumen will read its file tree and build an
           interactive insight report — file types, sizes, lines of code, and
           the largest files.</p>
        <button id="btn-open-empty" class="btn btn-primary">Open Repository…</button>
      </div>
    </section>

    <section id="report" class="report hidden"></section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
